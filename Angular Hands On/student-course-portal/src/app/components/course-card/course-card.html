<div
  class="card"
  appHighlight
  [ngClass]="cardClasses"
  [ngStyle]="{'border-left-color': borderColor}">

  <h3>{{ course.name }}</h3>

  <p><strong>ID:</strong> {{ course.id }}</p>

  <p><strong>Code:</strong> {{ course.code }}</p>

  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <span *ngSwitchCase="'passed'" class="passed">
      Passed
    </span>

    <span *ngSwitchCase="'failed'" class="failed">
      Failed
    </span>

    <span *ngSwitchDefault class="pending">
      Pending
    </span>

  </div>

  <br>

  <button (click)="enroll()">
    Enroll
  </button>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <div *ngIf="isExpanded">

    <hr>

    <p><strong>Course ID:</strong> {{ course.id }}</p>
    <p><strong>Course Code:</strong> {{ course.code }}</p>
    <p><strong>Status:</strong> {{ course.gradeStatus }}</p>

  </div>

</div>
