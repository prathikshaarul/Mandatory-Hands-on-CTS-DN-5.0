<h1>{{ portalName }}</h1>

<p>
  Welcome to the Student Course Portal. Browse available courses,
  manage your profile and track your academic progress.
</p>

<div>
  <p><strong>Courses Available:</strong> {{ availableCourses }}</p>
  <p><strong>Enrolled:</strong> 3</p>
  <p><strong>GPA:</strong> 3.8</p>
</div>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<br><br>

<input
  type="text"
  placeholder="Search Course"
  [(ngModel)]="searchTerm">

<p>Searching for: {{ searchTerm }}</p>
<app-course-list></app-course-list>
