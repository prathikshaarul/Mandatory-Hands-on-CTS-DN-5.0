<h2>Student Enrollment Request</h2>

<form #enrollForm="ngForm"
      (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->
  <label>Student Name</label>
  <br>

  <input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <br>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']" style="color:red">
    Name is required
  </span>

  <span *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']" style="color:red">
    Name must be at least 3 characters
  </span>

  <br><br>

  <!-- Student Email -->
  <label>Student Email</label>
  <br>

  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email
    #emailCtrl="ngModel">

  <br>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']" style="color:red">
    Email is required
  </span>

  <span *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']" style="color:red">
    Enter a valid email
  </span>

  <br><br>

  <!-- Course ID -->
  <label>Course ID</label>
  <br>

  <input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required
    #courseCtrl="ngModel">

  <br>

  <span *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']" style="color:red">
    Course ID is required
  </span>

  <br><br>

  <!-- Preferred Semester -->
  <label>Preferred Semester</label>
  <br>

  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester"
    required
    #semesterCtrl="ngModel">

    <option value="">Select Semester</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

  </select>

  <br>

  <span *ngIf="semesterCtrl.touched && semesterCtrl.errors?.['required']" style="color:red">
    Please select a semester
  </span>

  <br><br>

  <!-- Agree -->
  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required
      #agreeCtrl="ngModel">

    I agree to the Terms

  </label>

  <br>

  <span *ngIf="agreeCtrl.touched && agreeCtrl.errors?.['required']" style="color:red">
    You must agree to the terms
  </span>

  <br><br>

  <!-- Buttons -->
  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm()">

    Reset

  </button>

</form>

<!-- Success Message -->
<div *ngIf="submitted" class="success-message">
      Enrollment request submitted successfully!
</div>
